<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markup retreat</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Верстай звёздный рейтинг тут -->
     <div class="rating" id="rating">
      <span class="star" data-value="1"></span>
      <span class="star" data-value="2"></span>
      <span class="star" data-value="3"></span>
      <span class="star" data-value="4"></span>
      <span class="star" data-value="5"></span>
    </div>

    <script>
      const stars = document.querySelectorAll('.star');
      const rating = document.getElementById('rating');
      let currentRating = 0;

      function updateStars(hoverValue = null) {
        const valueToShow = hoverValue !== null ? hoverValue : currentRating;

        stars.forEach((star, index) => {
          if (index < valueToShow) {
            star.classList.add('active');
          } else {
            star.classList.remove('active');
          }
        });
      }



      rating.addEventListener('mouseover', (e) => {
        const star = e.target.closest('.star');
        if (star) {
          const hoverValue = parseInt(star.dataset.value);
          updateStars(hoverValue);
        }
      });

      rating.addEventListener('mouseout', () => {
        updateStars();
      });
    </script>
  </body>
</html>
